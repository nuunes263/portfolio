spring:
  application:
    name: portfolio
  datasource:
    url: jdbc:postgresql://${DATABASE_HOST}:${DATABASE_PORT}/${DATABASE}
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

admin:
  password: ${ADMIN_PASSWORD:admin}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
